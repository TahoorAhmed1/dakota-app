name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dakota-app:latest
            ${{ secrets.DOCKER_USERNAME }}/dakota-app:${{ github.sha }}
          cache-from: type=inline
          cache-to: type=inline

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "🔹 Logging into Docker Hub on EC2..."
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            echo "🔹 Pulling latest frontend image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/dakota-app:latest

            echo "🔹 Stopping old container..."
            docker stop dakota-app || true
            docker rm dakota-app || true

            echo "🔹 Running new container with HTTPS..."
            docker run -d \
              --name dakota-app \
              -p 80:80 \
              -p 443:443 \
              --restart unless-stopped \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              ${{ secrets.DOCKER_USERNAME }}/dakota-app:latest

            echo "🔹 Checking container..."
            docker ps | grep dakota-app

      - name: Done
        run: echo "✅ Backend deployed successfully!"

  cleanup-ec2:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Prune old images on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sleep 10
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f
            echo "✨ Server cleanup complete."
